site_name: 高等数学 · 张宇基础30讲
site_description: 考研数学知识点总结，基于张宇《基础30讲》整理
site_author: 考研数学整理
repo_url: https://github.com/Yan-yuze/gaoshu-zhangyu-30
repo_name: gaoshu-zhangyu-30
edit_uri: ""

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link
    - header.autohide
    - navigation.footer
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono

