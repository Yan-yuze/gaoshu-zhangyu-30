site_name: 高等数学 · 张宇基础30讲
site_description: 考研数学知识点总结，基于张宇《基础30讲》整理
site_author: 考研数学整理
repo_url: https://github.com/Yan-yuze/gaoshu-zhangyu-30
repo_name: gaoshu-zhangyu-30
edit_uri: ""

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link
    - header.autohide
    - navigation.footer
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono

nav:
  - 首页: index.md
  - 📐 高等数学:
    - 课程首页: 高等数学/index.md
    - 第1章 极限与连续: 高等数学/第1章-极限与连续/index.md
    - 第2章 一元函数微分学: 高等数学/第2章-一元函数微分学/index.md
    - 第3章 一元函数积分学: 高等数学/第3章-一元函数积分学/index.md
    - 第4章 多元函数微分学: 高等数学/第4章-多元函数微分学/index.md
    - 第5章 多元函数积分学:
      - 章首页: 高等数学/第5章-多元函数积分学/index.md
      - 第18讲（简洁版）: 高等数学/第5章-多元函数积分学/第18讲-多元函数积分学.md
      - 第18讲（详细版）: 高等数学/第5章-多元函数积分学/第十八讲详细版.md
    - 第6章 无穷级数: 高等数学/第6章-无穷级数/index.md
    - 第7章 微分方程: 高等数学/第7章-微分方程/index.md
  - 📈 线性代数:
    - 课程首页: 线性代数/index.md
    - 第1章 行列式: 线性代数/第1章-行列式/index.md
    - 第2章 矩阵: 线性代数/第2章-矩阵/index.md
    - 第3章 向量: 线性代数/第3章-向量/index.md
    - 第4章 线性方程组: 线性代数/第4章-线性方程组/index.md
    - 第5章 特征值与特征向量: 线性代数/第5章-特征值与特征向量/index.md
    - 第6章 二次型: 线性代数/第6章-二次型/index.md
  - 🎲 概率论:
    - 课程首页: 概率论/index.md
    - 第1章 随机事件与概率: 概率论/第1章-随机事件与概率/index.md
    - 第2章 随机变量及其分布: 概率论/第2章-随机变量及其分布/index.md
    - 第3章 多维随机变量: 概率论/第3章-多维随机变量/index.md
    - 第4章 数字特征: 概率论/第4章-数字特征/index.md
    - 第5章 大数定律与中心极限定理: 概率论/第5章-大数定律与中心极限定理/index.md
    - 第6章 数理统计基础: 概率论/第6章-数理统计基础/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js
  - javascripts/katex.js

extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css

copyright: Copyright &copy; 2026 考研数学整理

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Yan-yuze
      name: GitHub 仓库
